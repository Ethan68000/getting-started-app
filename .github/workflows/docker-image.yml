name: Build & push Docker image to Github Contaier Registry

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v6
    - name: Set environnement variable from github.repository_owner
      run: |
        echo "IMAGE_NAME=${GITHUB_REPOSITORY_OWNER@L}" >> ${GITHUB_ENV}
    - name: Install Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to Github Container registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push to registry
      uses: docker/build-push-action@v7
      with:
        context: .
        file: Dockerfile
        push: true
        plateforms: linux/amd64,linux/arm64
        tags: |
          ghcr.io/${{ env.IMAGE_NAME }}/getting-started:latest
    
