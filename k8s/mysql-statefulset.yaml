apiVersion: apps/V1
kind: StatefulSet
metadata:
  name: mysql
  namespace: todo-app
spec:
  servicename: mysql
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
